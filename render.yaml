services:
  - type: web
    name: ventoy-pro
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/status
    envVars:
      - key: NODE_VERSION
        value: 20.19.6
      - key: APP_DATA_DIR
        value: /var/data
    disk:
      name: ventoy-pro-data
      mountPath: /var/data
      sizeGB: 1
