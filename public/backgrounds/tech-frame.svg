<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="metal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1118"/>
      <stop offset="50%" stop-color="#1d212b"/>
      <stop offset="100%" stop-color="#080a12"/>
    </linearGradient>
    <linearGradient id="frame" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="50%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#metal)"/>
  <rect width="1920" height="1080" fill="#ffffff" opacity="0.03"/>
  <rect x="475" y="302" width="970" height="380" rx="12" fill="#111722" stroke="url(#frame)" stroke-width="4" filter="url(#glow)"/>
  <rect x="495" y="322" width="930" height="340" rx="10" fill="#0d121b" opacity="0.95"/>

  <g stroke="url(#frame)" stroke-width="3" fill="none" filter="url(#glow)">
    <path d="M 0 120 H 240 L 300 80 H 610" opacity="0.8"/>
    <path d="M 1310 80 H 1620 L 1700 120 H 1920" opacity="0.7"/>
    <path d="M 0 960 H 320 L 390 1010 H 640" opacity="0.75"/>
    <path d="M 1280 1010 H 1590 L 1675 960 H 1920" opacity="0.8"/>
    <path d="M 140 180 H 360 V 120 H 480" opacity="0.65"/>
    <path d="M 1780 180 H 1560 V 120 H 1440" opacity="0.65"/>
  </g>
</svg>
