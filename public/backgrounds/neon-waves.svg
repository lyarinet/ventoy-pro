<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c1024"/>
      <stop offset="45%" stop-color="#161b52"/>
      <stop offset="100%" stop-color="#0b1334"/>
    </linearGradient>
    <radialGradient id="panelGlow" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#2b2f7d" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#101638" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M 56 0 L 0 0 0 56" fill="none" stroke="#4f5bb7" stroke-opacity="0.25" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#grid)"/>
  <rect y="160" width="1920" height="760" fill="#0a0e20" opacity="0.78"/>
  <rect x="470" y="300" width="980" height="380" rx="28" fill="#11193f" stroke="#7c8fff" stroke-opacity="0.6" stroke-width="2"/>
  <rect x="490" y="320" width="940" height="340" rx="24" fill="url(#panelGlow)" opacity="0.92"/>

  <g fill="none" stroke="#2dd4bf" stroke-width="4" stroke-linecap="round" filter="url(#softGlow)">
    <path d="M -120 840 C 120 600, 300 980, 560 760 S 980 700, 1240 520 S 1640 840, 2040 680" opacity="0.92"/>
    <path d="M -120 800 C 120 570, 340 930, 620 720 S 1010 650, 1280 500 S 1660 810, 2040 650" opacity="0.75"/>
    <path d="M -120 340 C 120 140, 320 430, 600 250 S 1030 180, 1300 290 S 1650 460, 2040 260" opacity="0.88"/>
    <path d="M -120 380 C 120 180, 350 470, 630 290 S 1050 220, 1320 330 S 1670 500, 2040 310" opacity="0.62"/>
  </g>

  <g fill="#67e8f9" opacity="0.82">
    <circle cx="180" cy="740" r="3"/>
    <circle cx="240" cy="710" r="2"/>
    <circle cx="310" cy="760" r="2"/>
    <circle cx="420" cy="780" r="2"/>
    <circle cx="980" cy="250" r="2"/>
    <circle cx="1060" cy="270" r="3"/>
    <circle cx="1110" cy="240" r="2"/>
    <circle cx="1490" cy="360" r="3"/>
    <circle cx="1560" cy="340" r="2"/>
    <circle cx="1660" cy="390" r="2"/>
    <circle cx="1710" cy="350" r="3"/>
  </g>
</svg>
